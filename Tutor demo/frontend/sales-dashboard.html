<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Dashboard | Tutor Booking System</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-grid">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="user-profile">
        <div class="user-avatar" id="user-initials">S</div>
        <h3 id="user-name">Sales Name</h3>
        <p id="user-email" style="color: var(--text-dim); font-size: 0.875rem;">sales@example.com</p>
      </div>
      <nav class="nav-links">
        <a href="#" class="nav-item active">Browse Slots</a>
        <a href="#" class="nav-item">Booking History</a>
        <div class="nav-item logout-btn" id="logout-btn">Logout</div>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Browse Section -->
      <div id="browse-section">
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 class="card-title" style="margin-bottom: 0;">Available Tutor Demos</h2>
            <div id="polling-status" class="status-badge" style="background: rgba(16, 185, 129, 0.1); color: var(--success); text-transform: none; font-weight: 500;">
              <span class="pulse-dot"></span> Live
            </div>
          </div>
          
          <div class="filter-bar">
            <input type="date" id="filter-date" class="filter-input" placeholder="Filter by date">
            <input type="text" id="search-tutor" class="filter-input" placeholder="Search by tutor name...">
          </div>

          <div style="overflow-x: auto;">
            <table class="slot-list-table">
              <thead>
                <tr>
                  <th>Tutor</th>
                  <th>Date</th>
                  <th>Time Range</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="available-slots-body">
                <tr>
                  <td colspan="4" style="text-align: center; color: var(--text-dim);">Loading available slots...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- History Section -->
      <div id="history-section" class="hidden">
        <div class="card">
            <h2 class="card-title">My Booking History</h2>
            <div style="overflow-x: auto;">
              <table class="slot-list-table">
                <thead>
                  <tr>
                    <th>Tutor</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Client</th>
                  </tr>
                </thead>
                <tbody id="bookings-body">
                  <tr>
                    <td colspan="4" style="text-align: center; color: var(--text-dim);">Loading history...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
      </div>
    </div>
  </div>

  <!-- Booking Modal (Placeholder for Phase 5) -->
  <div class="modal-overlay" id="booking-modal">
    <div class="modal">
      <h2 class="card-title">Book Demo Session</h2>
      <p id="modal-slot-info" style="color: var(--text-dim); margin-bottom: 1.5rem;"></p>
      <form id="booking-form">
        <div class="form-group">
          <label for="client-name">Client Name</label>
          <input type="text" id="client-name" class="form-input" placeholder="Enter client's full name" required>
        </div>
        <div class="form-group">
          <label for="client-phone">Client Phone (Optional)</label>
          <input type="tel" id="client-phone" class="form-input" placeholder="+1 XXXXXXXXXX">
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
          <button type="button" class="btn-primary" style="background: var(--text-dim);" id="close-modal">Cancel</button>
          <button type="submit" class="btn-primary" id="confirm-booking-btn">Confirm Booking</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/sales.js"></script>
</body>
</html>
