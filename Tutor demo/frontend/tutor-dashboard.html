<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutor Dashboard | Tutor Booking System</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-container" style="background: none; padding: 0;">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="dashboard-grid">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="user-profile">
        <div class="user-avatar" id="user-initials">T</div>
        <h3 id="user-name">Tutor Name</h3>
        <p id="user-email" style="color: var(--text-dim); font-size: 0.875rem;">tutor@example.com</p>
      </div>
      <nav class="nav-links">
        <a href="#" class="nav-item active" id="nav-dashboard">Dashboard</a>
        <a href="#" class="nav-item" id="nav-calendar">Calendar View</a>
        <a href="#" class="nav-item" id="nav-bookings">My Bookings</a>
        <div class="nav-item logout-btn" id="logout-btn">Logout</div>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Reminder Banner (Phase 8) -->
      <div id="reminder-banner" class="card hidden" style="background: rgba(14, 165, 233, 0.1); border-color: var(--primary); padding: 1rem 2rem; color: white;">
        <!-- Injected via JS -->
      </div>

      <!-- Availability Tab -->
      <div id="availability-section">
        <div class="card">
          <h2 class="card-title">Add Availability Slot</h2>
          <form id="add-slot-form" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; align-items: end;">
            <div class="form-group" style="margin-bottom: 0;">
              <label for="slot-date">Date</label>
              <input type="date" id="slot-date" class="form-input" required>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
              <label for="start-time">Start Time</label>
              <input type="time" id="start-time" class="form-input" required>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
              <label for="end-time">End Time</label>
              <input type="time" id="end-time" class="form-input" required>
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 0;">Add Slot</button>
            <div class="form-group" style="margin-bottom: 0; grid-column: 1 / -1; display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
              <input type="checkbox" id="is-booked" style="width: auto;">
              <label for="is-booked" style="margin-bottom: 0;">Mark as Booked (Manual Demo)</label>
            </div>
            <div id="client-info-fields" class="hidden" style="grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; width: 100%;">
              <div class="form-group" style="margin-bottom: 0;">
                <label for="manual-client-name">Client Name</label>
                <input type="text" id="manual-client-name" class="form-input" placeholder="e.g. John Doe">
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label for="manual-client-phone">Client Phone</label>
                <input type="tel" id="manual-client-phone" class="form-input" placeholder="e.g. +1 234 567 890">
              </div>
            </div>
          </form>
        </div>

        <div class="card">
          <h2 class="card-title">My Availability Slots</h2>
          <div style="overflow-x: auto;">
            <table class="slot-list-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Time Range</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="slots-body">
                <tr>
                  <td colspan="3" style="text-align: center; color: var(--text-dim);">Loading slots...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Bookings Tab -->
      <div id="bookings-section" class="hidden">
        <div class="card">
            <h2 class="card-title">Upcoming Demo Bookings</h2>
            <div style="overflow-x: auto;">
              <table class="slot-list-table">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Client</th>
                    <th>Sales Rep</th>
                  </tr>
                </thead>
                <tbody id="bookings-body">
                  <tr>
                    <td colspan="4" style="text-align: center; color: var(--text-dim);">No upcoming bookings.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
      </div>

      <!-- Calendar Tab -->
      <div id="calendar-section" class="hidden">
        <div class="card">
            <div class="calendar-header">
                <h2 class="card-title" id="calendar-month-year" style="margin-bottom: 0;">Month Year</h2>
                <div class="calendar-controls">
                    <button class="btn-icon" id="prev-month">&lt;</button>
                    <button class="btn-icon" id="next-month">&gt;</button>
                </div>
            </div>
            
            <div class="calendar-container">
                <div class="calendar-grid" id="calendar-grid">
                    <!-- Day labels and cells will be injected here -->
                </div>
            </div>

            <div id="day-detail-panel" class="day-detail-panel">
                <h3 id="selected-date-title" style="margin-bottom: 1rem; color: var(--primary);">Selected Date</h3>
                <table class="slot-list-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Status/Client</th>
                        </tr>
                    </thead>
                    <tbody id="day-slots-body">
                        <!-- Slots for selected day -->
                    </tbody>
                </table>
            </div>
        </div>
      </div>
    </div>
    </div>
  </div>
</div>

  <script src="js/auth.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/tutor.js"></script>
</body>
</html>
