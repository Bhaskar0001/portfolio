# Docker Compose — Production / Full Stack
# NoticeRadar Enterprise

version: '3.8'

services:
  # ── API Server ────────────────────────────────────────
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: nr-server
    ports:
      - "5000:5000"
    env_file:
      - ../server/.env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── Web App ───────────────────────────────────────────
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: nr-web
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

  # ── Nginx Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nr-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
      - web
    restart: unless-stopped

  # ── Redis (BullMQ) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (S3-compatible storage) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: nr-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Keycloak (SSO / OIDC) ──────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    container_name: nr-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_pass}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keycloak" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nr-keycloak
    ports:
      - "8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_pass}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  minio_data:
  keycloak_db_data:
